repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format --check
        language: system
        pass_filenames: false
        always_run: true
      - id: mypy
        name: mypy
        entry: uv run mypy webresearch
        language: system
        pass_filenames: false
        always_run: true
